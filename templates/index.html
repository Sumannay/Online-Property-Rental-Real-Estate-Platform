<!DOCTYPE html>
<html>

<head>
    <title>Real Estate Website</title>

    <!-- ✅ Correct CSS path (Flask) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        /* NAVBAR */
        .navbar {
            background: #222;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        /* HERO SECTION */
        .hero {
            background: url("https://images.unsplash.com/photo-1560518883-ce09059eeffa");
            background-size: cover;
            background-position: center;
            height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .hero input {
            padding: 10px;
            width: 250px;
            border: none;
            border-radius: 5px;
        }

        .hero button {
            padding: 10px 15px;
            border: none;
            background: orange;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        /* PROPERTY GRID */
        .property-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
        }

        .card h3 {
            margin-top: 10px;
        }

        .card a {
            display: inline-block;
            margin-top: 10px;
            color: blue;
            text-decoration: none;
        }

        /* FOOTER */
        .footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div><b>RealEstate</b></div>

        <div>
            <a href="/">Home</a>

            {% if session.user %}
            <a href="/dashboard">Dashboard</a>
            <a href="/favorites">Favorites</a>
            <a href="/bookings">Bookings</a>
            <a href="/logout">Logout</a>
            {% else %}
            <a href="/login">Login</a>
            <a href="/register">Register</a>
            {% endif %}
        </div>
    </div>

    <!-- HERO SECTION -->
    <div class="hero">
        <h1>Find Your Dream Home</h1>

        <form method="POST">
            <input type="text" name="search" placeholder="Search by location">
            <button type="submit">Search</button>
        </form>
    </div>

    <!-- ✅ SLIDER ADDED HERE -->
    <div class="slider-container" style="margin-top: 30px;">
        <img id="slide" class="slider-img">

        <button class="slider-btn left" onclick="prevSlide()">❮</button>
        <button class="slider-btn right" onclick="nextSlide()">❯</button>
    </div>

    <!-- PROPERTY LIST -->
    <div class="property-grid">
        {% for p in properties %}
        <div class="card">
            <img src="{{ url_for('static', filename='uploads/' + p.image) }}">
            <h3>{{ p.title }}</h3>
            <p>{{ p.location }}</p>
            <p><b>₹{{ p.price }}</b></p>
            <a href="/property/{{ p.id }}">View Details</a>
        </div>
        {% endfor %}
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <p>© 2026 Real Estate Website | College Project</p>
    </div>

    <!-- ✅ JS FILE (VERY IMPORTANT) -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
