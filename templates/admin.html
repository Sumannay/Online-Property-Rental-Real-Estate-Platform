<!DOCTYPE html>
<html>

<head>

    <title>Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <div class="container mt-5">

        <h2>Admin Panel</h2>

        <h3>Users</h3>

        <table class="table">

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
            </tr>

            {% for u in users %}

            <tr>
                <td>{{u.id}}</td>
                <td>{{u.name}}</td>
                <td>{{u.email}}</td>
            </tr>

            {% endfor %}

        </table>

        <h3>Properties</h3>

        <table class="table">

            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Location</th>
                <th>Price</th>
            </tr>

            {% for p in properties %}

            <tr>
                <td>{{p.id}}</td>
                <td>{{p.title}}</td>
                <td>{{p.location}}</td>
                <td>{{p.price}}</td>
            </tr>

            {% endfor %}

        </table>

    </div>

</body>

</html>
