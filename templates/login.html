<!DOCTYPE html>
<html>

<head>
  <title>Login | Real Estate</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: url("https://images.unsplash.com/photo-1560518883-ce09059eeffa");
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      width: 400px;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>

<body>

  <div class="login-card">

    <h3 class="text-center mb-4">User Login</h3>

    <form method="POST">

      <input type="email" name="email" class="form-control mb-3" placeholder="Enter Email" required>

      <input type="password" name="password" class="form-control mb-3" placeholder="Enter Password" required>

      <button class="btn btn-primary w-100">Login</button>

    </form>

    <p class="text-center mt-3">
      Don't have account?
      <a href="/register">Register</a>
    </p>

    <a href="/" class="btn btn-secondary w-100 mt-2">Back to Home</a>

  </div>

</body>

</html>
