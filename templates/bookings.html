<!DOCTYPE html>
<html>

<head>
    <title>Your Bookings | Real Estate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">
        <h2>Your Booked Properties</h2>
        <a href="/" class="btn btn-secondary mb-3">Back Home</a>
        <div class="row">
            {% for p in properties %}
            <div class="col-md-4">
                <div class="card shadow mb-4">
                    <img src="{{ url_for('static',filename='uploads/'+p.image) }}" class="card-img-top">
                    <div class="card-body">
                        <h5>{{p.title}}</h5>
                        <p>{{p.location}}</p>
                        <p>₹ {{p.price}}</p>
                        <span class="badge bg-success">Booked</span>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

</body>

</html>
