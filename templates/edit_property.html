<!DOCTYPE html>
<html>

<head>

    <title>Edit Property</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            margin-top: 50px;
            border-radius: 8px;
            box-shadow: 0 0 10px #ccc;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background: blue;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }

        .back {
            margin-top: 15px;
            display: inline-block;
        }

        .error {
            color: red;
            margin-bottom: 10px;
        }

        .success {
            color: green;
            margin-bottom: 10px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Edit Property</h2>

        <!-- ✅ FLASH MESSAGES -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <p class="{{ category }}">{{ message }}</p>
        {% endfor %}
        {% endwith %}

        <!-- ✅ FORM WITH VALIDATION -->
        <form method="POST" onsubmit="return validateForm()">

            <label>Property Title</label>
            <input type="text" name="title" value="{{ property.title }}" required>

            <label>Location</label>
            <input type="text" id="location" name="location" value="{{ property.location }}" required>

            <label>Price</label>
            <input type="text" id="price" name="price" value="{{ property.price }}" required>

            <label>Contact Number</label>
            <input type="text" id="contact" name="contact_number" value="{{ property.contact_number }}" required>

            <label>Description</label>
            <textarea name="description" rows="4">{{ property.description }}</textarea>

            <button type="submit">Update Property</button>

        </form>

        <br>

        <a href="/dashboard" class="back">⬅ Back to Dashboard</a>

    </div>

    <!-- ✅ VALIDATION SCRIPT -->
    <script>
        function validateForm() {

            let price = document.getElementById("price").value;
            let contact = document.getElementById("contact").value;
            let location = document.getElementById("location").value;

            // price must be number
            if (isNaN(price)) {
                alert("❌ Price must be numbers only");
                return false;
            }

            // contact must be 10 digits
            if (!/^[0-9]{10}$/.test(contact)) {
                alert("❌ Enter valid 10-digit contact number");
                return false;
            }

            // location must be letters only
            if (!/^[A-Za-z ]+$/.test(location)) {
                alert("❌ Location should contain only letters");
                return false;
            }

            return true;
        }
    </script>

</body>

</html>
