{% extends "base.html" %}

{% block content %}

<style>
    body {
        font-family: Arial;
        background: #f5f5f5;
    }

    .container-box {
        max-width: 900px;
        margin: auto;
        background: white;
        padding: 20px;
        margin-top: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px #ccc;
    }

    /* IMAGE SLIDER */
    .slider-container {
        position: relative;
        width: 100%;
        height: 400px;
        margin-bottom: 20px;
    }

    .slider-img {
        width: 100%;
        height: 400px;
        object-fit: cover;
        border-radius: 10px;
    }

    .slider-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0, 0, 0, 0.5);
        color: white;
        border: none;
        padding: 10px 15px;
        cursor: pointer;
        border-radius: 50%;
    }

    .left {
        left: 10px;
    }

    .right {
        right: 10px;
    }

    .price {
        font-size: 22px;
        font-weight: bold;
        margin-top: 10px;
        color: green;
    }

    .contact {
        color: #444;
        margin-top: 5px;
    }

    .map {
        margin-top: 20px;
    }

    .btn-custom {
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-right: 10px;
        color: white;
    }

    .book {
        background: green;
    }

    .favorite {
        background: orange;
    }
</style>

<div class="container-box">

    <h2>{{ property.title }}</h2>

    <!-- ✅ IMAGE SLIDER FIXED -->
    <div class="slider-container">

        <!-- IMPORTANT: id must be "slide" -->
        <img id="slide" class="slider-img">

        <button onclick="prevSlide()" class="slider-btn left">❮</button>
        <button onclick="nextSlide()" class="slider-btn right">❯</button>

    </div>

    <div class="price">
        Price: ₹{{ property.price }}
    </div>

    <div class="contact">
        Contact: {{ property.contact_number }}
    </div>

    <p>
        {{ property.description }}
    </p>

    <h3>Location Map</h3>

    <div class="map">
        <iframe width="100%" height="400" style="border:0" loading="lazy" allowfullscreen
            src="https://www.google.com/maps?q={{ property.location }}&output=embed">
        </iframe>
    </div>

    <br>

    <a href="/book/{{ property.id }}">
        <button class="btn-custom book">Book Property</button>
    </a>

    <a href="/favorite/{{ property.id }}">
        <button class="btn-custom favorite">Add Favorite</button>
    </a>

</div>

<!-- ================= SCRIPTS ================= -->

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

<!-- ✅ CORRECT FUNCTION CALL -->
<script>
    startSlider(
        "{{ property.image }}",
        "{{ property.image2 }}",
        "{{ property.image3 }}"
    );
</script>

{% endblock %}
